name: CI

# Verifies the KMP app builds + tests on every push/PR. Steps are split per
# target so a failure pinpoints WHICH part broke (the combined invocation hid
# it). iOS targets need a macOS runner — a future matrix job; this Linux job
# covers config, the shared module, the desktop (JVM) app, the Android app, and
# the JVM/Android unit tests.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Linux — JVM/Desktop/Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Configures every module + resolves the build model. Catches plugin /
      # version / SDK-location problems fast, before any compilation.
      - name: Validate Gradle configuration
        run: ./gradlew help projects --stacktrace

      - name: Build shared module (JVM + Android)
        run: ./gradlew :shared:jvmJar :shared:assembleRelease --stacktrace

      - name: Build desktop (JVM) app
        run: ./gradlew :desktop:assemble --stacktrace

      - name: Build Android debug app
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Run unit tests (JVM + Android)
        run: ./gradlew :shared:jvmTest :shared:testDebugUnitTest :composeApp:testDebugUnitTest --continue --stacktrace
