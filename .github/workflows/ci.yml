name: CI

# Builds the canonical Compose-Multiplatform app (:composeApp) for Android +
# desktop on every push/PR — verified green locally. iOS targets need a macOS
# runner (future matrix job). NOTE: the separate :desktop and :android modules
# are stale duplicates that don't compile (unresolved references) and tests live
# in a non-wired top-level tests/ dir — both tracked as follow-ups, so they're
# intentionally not built here yet.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build canonical app (Android + Desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Configures every module — catches plugin/version/SDK problems fast.
      - name: Validate Gradle configuration
        run: ./gradlew projects --stacktrace

      - name: Build app — Android (debug APK)
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Build app — Desktop (JVM jar)
        run: ./gradlew :composeApp:desktopJar --stacktrace
